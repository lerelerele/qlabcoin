name: publish-dashboard

# Regenerate the public dashboard from the canonical chain and publish it to
# GitHub Pages whenever main advances. This keeps https://<user>.github.io/qlabcoin/
# in sync with the public clock without a manual push.

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# pages: write lets us deploy via actions/deploy-pages. contents: write is no
# longer needed because we no longer push to a gh-pages branch.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one publish at a time; a newer run cancels an in-flight older one.
concurrency:
  group: publish-dashboard
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build CLI
        run: go build -o bin/qlabcoin ./cmd/qlabcoin

      # The canonical chain is the source of truth. This also doubles as a
      # check: if verify-chain fails (tampered links, bad signature, or an
      # unverifiable recorded solution) the dashboard does not get published.
      - name: Verify canonical chain
        run: ./bin/qlabcoin verify-chain -chain qlabcoin-canonical-chain.json

      - name: Regenerate dashboard
        run: ./bin/qlabcoin dashboard -html -out dashboard.html -chain qlabcoin-canonical-chain.json

      # actions/deploy-pages expects a single-page upload rooted at the path,
      # so we place index.html in a clean _site directory.
      - name: Stage site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
